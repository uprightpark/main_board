<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Main Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-overlay"></div>
    
    <div id="app-container">
        <header>
            <h1><span style="color: #D1A1D6">META LAND</span></h1>
            <p>METAMONG CHALLENGE</p>
        </header>

        <div id="game-list">
            <div class="game-box status-open" onclick="openPopup('마리오파티', '\n1등: ⭐ 2개째부터 ₩10,000\n2등: ⭐ 2개째부터 ₩5,000 + 소음이 침대 6시간\n3등: 소라 6시간 휴가\n4등: 상어 6시간 휴가')">
                <span class="game-title">GAME 1: 닌텐도 </span>
                <span class="status-badge">OPEN</span>
            </div>

            <div class="game-box status-done" onclick="openPopup('숫자 입력', '\n₩21,000 이하: 우비 침대 6시간\n₩15,500 이하: 와둥 침대 6시간\n₩10,000 이하: 아둥 침대 6시간')">
                <span class="game-title">₩17,500 + 우비6시간 </span>
                <span class="status-badge">동체시력 DONE</span>
            </div>
            <!--onclick="openPopup('숫자 입력', '\n₩21,000 이하: 우비 침대 6시간\n₩15,500 이하: 와둥 침대 6시간\n₩10,000 이하: 아둥 침대 6시간')"-->

            <div class="game-box status-open" onclick="openPopup('블록 쌓기', '\n10층: 5/5 홍련\n9층: ₩15,000\n8층: ₩5.000\n7층: 소음 6시간 침대\n6층: 소라 6시간 휴가\n5층: 상어 6시간 휴가\n4층: 소라 24시간 휴가\n0-3층: 상어 24시간 휴가')">
                <span class="game-title">GAME 3: 타이밍</span>
                <span class="status-badge">OPEN</span>
            </div>

            <div class="game-box status-close" onclick="openPopup('Speed Reaction', '10,000')">
                <span class="game-title">GAME 4: 운</span>
                <span class="status-badge">CLOSE</span>
            </div>

            <div class="game-box status-close">
                <span class="game-title">GAME 5: 암기</span>
                <span class="status-badge">CLOSE</span>
            </div>
            
            <div class="game-box status-close">
                <span class="game-title">GAME 6: ???</span>
                <span class="status-badge">CLOSE</span>
            </div>
            
            <div class="game-box status-close">
                <span class="game-title">GAME 7: ???</span>
                <span class="status-badge">CLOSE</span>
            </div>
            
        </div>

        <footer>
            <div class="total-box">
                <span class="total-label">TOTAL RESULT</span>
                <span class="total-value">₩17,500 <br> 우비 침대 6시간</span>
            </div>
        </footer>
    </div>

    <div id="popup-overlay" onclick="closePopup()">
        <div id="popup-content" onclick="event.stopPropagation()">
            <div class="popup-header">CHALLENGE INFO</div>
            <div class="popup-body">
                <p>GAME: <span id="pop-game-name">---</span></p>
                <p>REWARD: <span id="pop-prize-amount">0</span></p>
            </div>
            <button class="close-btn" onclick="closePopup()">BACK</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
