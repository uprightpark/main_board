<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLASH! Mobile Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-overlay"></div>
    
    <div id="app-container">
        <header>
            <h1>FLASH!<span>HUB</span></h1>
            <p>SELECT YOUR CHALLENGE</p>
        </header>

        <div id="game-list">
            <div class="game-box status-open" onclick="openPopup('Memory \nFlash', '정말정말긴단어가들어간<br>다면감당가능할지궁금함')">
                <span class="game-title">GAME 1</span>
                <span class="status-badge">OPEN</span>
            </div>

            <div class="game-box status-close">
                <span class="game-title">GAME 2</span>
                <span class="status-badge">CLOSE</span>
            </div>

            <div class="game-box status-close">
                <span class="game-title">GAME 3</span>
                <span class="status-badge">CLOSE</span>
            </div>

            <div class="game-box status-close" onclick="openPopup('Speed Reaction', '10,000')">
                <span class="game-title">GAME 4</span>
                <span class="status-badge">CLOSE</span>
            </div>

            <div class="game-box status-close">
                <span class="game-title">GAME 5</span>
                <span class="status-badge">CLOSE</span>
            </div>
            
            <div class="game-box status-close">
                <span class="game-title">GAME 6</span>
                <span class="status-badge">CLOSE</span>
            </div>
            
            <div class="game-box status-close">
                <span class="game-title">GAME 7</span>
                <span class="status-badge">CLOSE</span>
            </div>
            
        </div>

        <footer>
            <div class="total-box">
                <span class="total-label">TOTAL RESULT</span>
                <span class="total-value">-</span>
            </div>
        </footer>
    </div>

    <div id="popup-overlay" onclick="closePopup()">
        <div id="popup-content" onclick="event.stopPropagation()">
            <div class="popup-header">CHALLENGE INFO</div>
            <div class="popup-body">
                <p>GAME: <span id="pop-game-name">---</span></p>
                <p>REWARD: <span id="pop-prize-amount">0</span> ₩</p>
            </div>
            <button class="close-btn" onclick="closePopup()">BACK</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
